version: 2

models:
  - name: gold_llm_context
    description: "Silver 이벤트 중복 제거 후 LLM 컨텍스트 포함 Gold 테이블 (global_event_id 기준 1 row)"
    columns:
      - name: global_event_id
        description: "GDELT 고유 이벤트 ID — dedup key"
        tests:
          - not_null
          - unique
      - name: event_date
        description: "이벤트 발생일 (YYYYMMDD)"
        tests:
          - not_null
      - name: event_code
        description: "CAMEO 이벤트 코드"
        tests:
          - not_null
      - name: llm_content_text
        description: "Gemini 입력용 한국어 컨텍스트 문자열 — concat으로 항상 생성됨"
        tests:
          - not_null
