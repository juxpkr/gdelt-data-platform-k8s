version: 2

models:
  - name: gold_llm_context
    description: "Silver 이벤트 중복 제거 후 이벤트 상세 조회와 외부 소비용 context를 포함한 Gold 테이블 (global_event_id 기준 1 row)"
    columns:
      - name: global_event_id
        description: "GDELT 고유 이벤트 ID — dedup key"
        tests:
          - not_null
          - unique
      - name: event_date
        description: "이벤트 발생일 (YYYYMMDD)"
        tests:
          - not_null
      - name: event_code
        description: "CAMEO 이벤트 코드"
        tests:
          - not_null
      - name: source_batch_id
        description: "Bronze/Silver/Gold E2E 추적용 배치 ID (YYYYMMDDHHMMSS)"
        tests:
          - not_null
      - name: gold_processed_at
        description: "Gold 테이블 반영 시각"
        tests:
          - not_null
      - name: llm_content_text
        description: "이벤트 상세 조회와 외부 소비를 위한 한국어 Gold context 문자열 — concat으로 항상 생성됨"
        tests:
          - not_null
