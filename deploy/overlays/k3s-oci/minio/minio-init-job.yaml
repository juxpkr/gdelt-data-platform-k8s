apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: gdelt
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-minio
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z minio 9000; do echo waiting for minio; sleep 3; done"]
      containers:
        - name: mc
          image: minio/mc
          command:
            - sh
            - -c
            - |
              mc alias set local http://minio:9000 minioadmin minioadmin
              mc mb --ignore-existing local/warehouse
              echo "bucket warehouse ready"
