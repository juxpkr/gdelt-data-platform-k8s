apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: gdelt
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: [localhost:9090]

      - job_name: airflow
        static_configs:
          - targets: [airflow-statsd-exporter.gdelt.svc.cluster.local:9102]
        honor_labels: true

      - job_name: kafka
        static_configs:
          - targets: [kafka.gdelt.svc.cluster.local:9092]

      - job_name: minio
        metrics_path: /minio/v2/metrics/cluster
        static_configs:
          - targets: [minio.gdelt.svc.cluster.local:9000]

      - job_name: gdelt-metrics-exporter
        static_configs:
          - targets: [gdelt-metrics-exporter.gdelt.svc.cluster.local:8000]
        metrics_path: /metrics
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: gdelt
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: gdelt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v3.11.3
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=7d
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: gdelt
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
