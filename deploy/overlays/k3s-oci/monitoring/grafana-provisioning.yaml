apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: gdelt
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: gdelt-prometheus
        access: proxy
        url: http://prometheus.gdelt.svc.cluster.local:9090
        isDefault: true
        jsonData:
          timeInterval: "30s"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: gdelt
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: GDELT
        type: file
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
---
