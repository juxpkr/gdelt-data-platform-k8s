# Airflow 3.1.3 / Helm chart 1.20.0
# LocalExecutor — Redis/Celery worker 없음

images:
  airflow:
    repository: juxpkr/gdelt-airflow
    tag: airflow-3.1.3-python3.12-spark3.5-delta3.3-arm64
    pullPolicy: IfNotPresent

executor: LocalExecutor

# 외부 PostgreSQL 사용
postgresql:
  enabled: false

data:
  metadataConnection:
    user: postgres
    pass: postgres
    host: postgres.gdelt.svc.cluster.local
    port: 5432
    db: airflow
    protocol: postgresql

# Redis 비활성화 (LocalExecutor 불필요)
redis:
  enabled: false

# 환경변수 공통
env:
  - name: KAFKA_BOOTSTRAP_SERVERS
    value: kafka.gdelt.svc.cluster.local:9092
  - name: KAFKA_TOPIC_GDELT_EVENTS
    value: gdelt_events_bronze
  - name: KAFKA_TOPIC_GDELT_MENTIONS
    value: gdelt_mentions_bronze
  - name: KAFKA_TOPIC_GDELT_GKG
    value: gdelt_gkg_bronze
  - name: MINIO_ENDPOINT
    value: http://minio.gdelt.svc.cluster.local:9000
  - name: MINIO_ROOT_USER
    value: minioadmin
  - name: MINIO_ROOT_PASSWORD
    value: minioadmin
  - name: SPARK_LOCAL_MODE
    value: "local[2]"
  - name: SPARK_DRIVER_MEMORY
    value: 3g

scheduler:
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: 1500m
      memory: 3Gi
  extraVolumes:
    - name: dags
      hostPath:
        path: /home/ubuntu/gdelt-data-platform-k8s/apps/airflow/dags
        type: Directory
    - name: spark-jobs
      hostPath:
        path: /home/ubuntu/gdelt-data-platform-k8s/apps/spark-jobs
        type: Directory
  extraVolumeMounts:
    - name: dags
      mountPath: /opt/airflow/dags
      readOnly: true
    - name: spark-jobs
      mountPath: /opt/airflow/spark-jobs
      readOnly: true

webserver:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  extraVolumes:
    - name: dags
      hostPath:
        path: /home/ubuntu/gdelt-data-platform-k8s/apps/airflow/dags
        type: Directory
  extraVolumeMounts:
    - name: dags
      mountPath: /opt/airflow/dags
      readOnly: true
  env:
    - name: AIRFLOW__WEBSERVER__WORKERS
      value: "2"
  startupProbe:
    failureThreshold: 30
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 30
    failureThreshold: 5
  readinessProbe:
    initialDelaySeconds: 15
    periodSeconds: 30
    failureThreshold: 5

dagProcessor:
  extraVolumes:
    - name: dags
      hostPath:
        path: /home/ubuntu/gdelt-data-platform-k8s/apps/airflow/dags
        type: Directory
    - name: spark-jobs
      hostPath:
        path: /home/ubuntu/gdelt-data-platform-k8s/apps/spark-jobs
        type: Directory
  extraVolumeMounts:
    - name: dags
      mountPath: /opt/airflow/dags
      readOnly: true
    - name: spark-jobs
      mountPath: /opt/airflow/spark-jobs
      readOnly: true

triggerer:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

# LocalExecutor — workers 불필요
workers:
  replicas: 0

statsd:
  enabled: false

config:
  core:
    parallelism: "4"
    max_active_tasks_per_dag: "4"
    max_active_runs_per_dag: "1"
    load_examples: "False"
    catchup_by_default: "False"

dags:
  persistence:
    enabled: false
  gitSync:
    enabled: false

ingress:
  web:
    enabled: true
    ingressClassName: traefik
    hosts:
      - name: ""
