apiVersion: apps/v1
kind: Deployment
metadata:
  name: gdelt-web
  namespace: gdelt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gdelt-web
  template:
    metadata:
      labels:
        app: gdelt-web
    spec:
      containers:
        - name: web
          image: juxpkr/gdelt-web:0.1.0-arm64
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gdelt-web
  namespace: gdelt
spec:
  selector:
    app: gdelt-web
  ports:
    - name: http
      port: 80
      targetPort: 80
