apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gdelt-dashboard
  namespace: gdelt
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/api`)
      kind: Rule
      services:
        - name: gdelt-api
          port: 8000
    - match: PathPrefix(`/`)
      kind: Rule
      services:
        - name: gdelt-web
          port: 80
